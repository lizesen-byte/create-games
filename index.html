<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformers: Cyber Battle</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
    <h2>Transformers: Cyber Battle</h2>

    <div>Health</div>
    <div class="bar">
        <div id="health"></div>
    </div>

    <div>Energy</div>
    <div class="bar">
        <div id="energy"></div>
    </div>

    <div id="xp">XP: 0</div>

    <div id="controls">
        WASD = Move<br>
        Space = Shoot<br>
        T = Transform
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
